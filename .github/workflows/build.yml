name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK (unsigned)
      run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=dummy -Pandroid.injected.signing.store.password=dummy -Pandroid.injected.signing.key.alias=dummy -Pandroid.injected.signing.key.password=dummy || ./gradlew assembleRelease || echo "Release build skipped (no signing config)"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: timecalendar-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      if: hashFiles('app/build/outputs/apk/release/*.apk') != ''
      uses: actions/upload-artifact@v4
      with:
        name: timecalendar-release
        path: app/build/outputs/apk/release/*.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: 时光历 v${{ github.run_number }}
        files: app/build/outputs/apk/debug/*.apk
        body: |
          ## 时光历 TimeCalendar v${{ github.run_number }}

          > 记录时光流转的每一个日子

          融合倒数日 + 经期管理的一站式日子记录 App。

          ### ✨ 功能
          - 📅 统一日历视图（公历+农历）
          - ⏰ 倒数日/正数日管理
          - 🩺 经期记录与智能预测
          - 🎨 个性化主题
          - 🔐 隐私保护
          - 🛠 日期计算器
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
